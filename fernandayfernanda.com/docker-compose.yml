version: '3.8'
services:
  db:
    image: postgres:15-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fernandayfernanda
    volumes:
      - postgres_data_fernanda:/var/lib/postgresql/data

volumes:
  postgres_data_fernanda:
